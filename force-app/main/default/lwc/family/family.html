<template>

    <!-- ================= FAMILY VIEW ================= -->
    <template if:false={showMemberComponent}>

        <lightning-card title="Family">

            <!-- BUTTON -->
            <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                <lightning-button
                    label="New Family"
                    icon-name="utility:user"
                    variant="brand"
                    onclick={openCreateModal}>
                </lightning-button>
            </div>

            <!-- SEARCH -->
            <lightning-input
                type="search"
                label="Search Family"
                onchange={handleSearchChange}>
            </lightning-input>

            <!-- TABLE -->
            <lightning-datatable
                key-field="Id"
                data={families}
                columns={columns}
                onrowaction={handleRowAction}>
            </lightning-datatable>

        </lightning-card>

    </template>


    <!-- ================= MEMBER VIEW ================= -->
    <template if:true={showMemberComponent}>

        <c-members 
            selected-family-id={selectedFamilyId}
            onback={handleBack}>
        </c-members>

    </template>


    <!-- ================= MODAL (ALWAYS OUTSIDE) ================= -->
    <template if:true={isModalOpen}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">New Family</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">

                    <lightning-input
                        label="Family Name"
                        value={familyName}
                        required=""
                        onchange={handleNameChange}>
                    </lightning-input>

                    <!-- family head  -->
                   <lightning-input label="Family Head Name" onchange={handleHeadChange}></lightning-input>

                   <lightning-input label="Head Address" onchange={handleHeadAddress}></lightning-input>

                   <lightning-input type="number" label="Head Age" onchange={handleHeadAge}></lightning-input>

                   <lightning-input type="tel" label="Head Phone" onchange={handleHeadPhone}></lightning-input>

                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                    <lightning-button variant="brand" label="Save" onclick={saveFamily}></lightning-button>
                </footer>

            </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

</template>
