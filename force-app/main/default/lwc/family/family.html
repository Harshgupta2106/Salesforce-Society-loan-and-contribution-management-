<template>

    <!-- ================= FAMILY VIEW ================= -->
    <template if:false={showMemberComponent}>

        <lightning-card title="Family">

            <!-- BUTTON -->
            <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">
                <lightning-button
                    label="New Family"
                    icon-name="utility:user"
                    variant="brand"
                    onclick={openCreateModal}>
                </lightning-button>
            </div>

            <!-- SEARCH -->
            <lightning-input
                type="search"
                label="Search Family"
                onchange={handleSearchChange}>
            </lightning-input>

            <!-- TABLE -->
            <lightning-datatable
                key-field="Id"
                data={families}
                columns={columns}
                onrowaction={handleRowAction}>
            </lightning-datatable>

        </lightning-card>

    </template>


    <!-- ================= MEMBER VIEW ================= -->
    <template if:true={showMemberComponent}>

        <c-members 
            selected-family-id={selectedFamilyId}
            onback={handleBack}>
        </c-members>

    </template>


    <!-- ================= MODAL ================= -->
    <template if:true={isModalOpen}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2 class="slds-text-heading_medium">New Family</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">

                    <!-- Family Name -->
                    <lightning-input
                        label="Family Name"
                        value={familyName}
                        required
                        onchange={handleNameChange}>
                    </lightning-input>


                    <!-- ================= CREATE MODE ================= -->
                    <template if:false={editRecordId}>

                        <lightning-input
                            label="Family Head"
                            value={familyHeadName}
                            onchange={handleHeadInput}>
                        </lightning-input>

                        <lightning-input
                            label="Head Address"
                            onchange={handleHeadAddress}>
                        </lightning-input>

                        <lightning-input
                            type="number"
                            label="Head Age"
                            onchange={handleHeadAge}>
                        </lightning-input>

                        <lightning-input
                            type="tel"
                            label="Head Phone"
                            onchange={handleHeadPhone}>
                        </lightning-input>

                    </template>


                    <!-- ================= EDIT MODE ================= -->
                    <template if:true={editRecordId}>

                        <lightning-combobox
                            label="Select Family Head"
                            value={selectedHeadId}
                            options={memberOptions}
                            onchange={handleHeadChange}>
                        </lightning-combobox>

                    </template>

                </div>

                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Cancel"
                        onclick={closeModal}>
                    </lightning-button>

                    <lightning-button
                        variant="brand"
                        label="Save"
                        onclick={saveFamily}>
                    </lightning-button>
                </footer>

            </div>
        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

</template>
