<template>
    <lightning-card title="Member DashBoard ">
        
        <!--  BUTTON BAR -->
        <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">

            <!-- LEFT -->
            <lightning-button
                label="Add Member"
                icon-name="utility:user"
                variant="brand"
                onclick={openCreateModal}>
            </lightning-button>

        </div>

        <!--  SEARCH -->
        <lightning-input
        type="search"
        label="Search Member"
        value={searchKey}
        onchange={handleSearchChange}>
    </lightning-input>
    
       <!--  TABLE -->
        <lightning-datatable
            key-field="Id"
            data={members}
            columns={columns}
            onrowaction={handleRowAction}
            onrowselection={handleRowSelection}>
        </lightning-datatable>

        <!-- Back button -->
        <lightning-button 
        label="Back"
        variant="neutral"
        onclick={goBack}>
       </lightning-button>

   <template if:true={isOpen}>
    <section class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">

            <header class="slds-modal__header">
                <h2>Add Member</h2>
            </header>
            

            <div class="slds-modal__content slds-p-around_medium">

                <lightning-input label="Member Name" value={memberName} onchange={handleMemberName}></lightning-input>
                                <lightning-input
                                    label="Family Selected"
                                    value={selectedFamilyName}
                                    disabled>
                                </lightning-input>
                <lightning-input label="Address"  value={address} onchange={handleAddress}></lightning-input>
                <lightning-input type="number" label="Age"  value={age} onchange={handleAge}></lightning-input>
                <lightning-input type="tel" label="Phone" value={phone} onchange={handlePhone}></lightning-input>

            </div>

            <footer class="slds-modal__footer">
                <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                <lightning-button variant="brand" label="Save" onclick={saveMember}></lightning-button>
            </footer>

        </div>
    </section>

    <div class="slds-backdrop slds-backdrop_open"></div>
</template> 

        <!-- VIEW MEMBER MODAL -->

        <template if:true={showViewModal}>

            <section class="slds-modal slds-fade-in-open">

                <div class="slds-modal__container">

                    <header class="slds-modal__header">

                        <h2 class="slds-text-heading_medium">
                            Member Details
                        </h2>

                    </header>

                    <div class="slds-modal__content slds-p-around_medium">

                        <p>
                            <strong>Name:</strong>
                            {viewMemberData.Name}
                        </p> <br> <br>

                        <p>
                            <strong>Address:</strong>
                            {viewMemberData.Address__c}
                        </p> <br> <br>

                        <p>
                            <strong>Age:</strong>
                            {viewMemberData.Age__c}
                        </p> <br> <br>

                        <p>
                            <strong>Phone:</strong>
                            {viewMemberData.Phone__c}
                        </p>

                    </div>

                    <footer class="slds-modal__footer">

                        <lightning-button
                            label="Close"
                            onclick={closeViewModal}>
                        </lightning-button>

                    </footer>

                </div>

            </section>

            <div class="slds-backdrop slds-backdrop_open"></div>

        </template>
 </lightning-card>
</template>
