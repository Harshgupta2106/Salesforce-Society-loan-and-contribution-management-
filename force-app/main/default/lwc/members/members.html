<template>

    <!-- MEMBER DASHBOARD -->
    <template if:false={showTransactionComponent}>

        <lightning-card title="Member DashBoard ">
            
            <!--  BUTTON BAR -->
            <div class="slds-grid slds-grid_align-spread slds-m-bottom_small">

                <!-- LEFT -->
                <lightning-button
                    label="Add Member"
                    icon-name="utility:user"
                    variant="brand"
                    onclick={openCreateModal}>
                </lightning-button>

                <!-- RIGHT -->
                <lightning-button
                    label="Transaction Dashboard"
                    icon-name="utility:money"
                    variant="success"
                    onclick={openTransactionDashboard}>
                </lightning-button>

            </div>

            <!-- SEARCH -->
             <!-- all delete button -->
            <template if:true={showDeleteButton}>

                <lightning-button
                    label="Delete Selected"
                    icon-name="utility:delete"
                    variant="destructive"
                    onclick={deleteSelectedMembers}>
                </lightning-button>

            </template>

            <lightning-input
                type="search"
                label="Search Member"
                value={searchKey}
                onchange={handleSearchChange}>
            </lightning-input>
        
            <!-- TABLE -->
            <lightning-datatable
                key-field="Id"
                data={members}
                columns={columns}
                onrowaction={handleRowAction}
                onrowselection={handleRowSelection}>
            </lightning-datatable>

            <!-- Back button -->
            <br>

            <lightning-button 
                label="Back"
                variant="neutral"
                onclick={goBack}>
            </lightning-button>

            <!-- ADD / EDIT MEMBER MODAL -->
            <template if:true={isOpen}>

                <section class="slds-modal slds-fade-in-open">

                    <div class="slds-modal__container">

                        <header class="slds-modal__header">
                            <h2>Add Member</h2>
                        </header>

                        <div class="slds-modal__content slds-p-around_medium">

                            <lightning-input
                                label="Member Name"
                                value={memberName}
                                onchange={handleMemberName}>
                            </lightning-input>

                            <lightning-input
                                label="Family Selected"
                                value={selectedFamilyName}
                                disabled>
                            </lightning-input>

                            <lightning-input
                                label="Address"
                                value={address}
                                onchange={handleAddress}>
                            </lightning-input>

                            <lightning-input
                                type="number"
                                label="Age"
                                value={age}
                                onchange={handleAge}>
                            </lightning-input>

                            <lightning-input
                                type="tel"
                                label="Phone"
                                value={phone}
                                onchange={handlePhone}>
                            </lightning-input>

                        </div>

                        <footer class="slds-modal__footer">

                            <lightning-button
                                label="Cancel"
                                onclick={closeModal}>
                            </lightning-button>

                            <lightning-button
                                variant="brand"
                                label="Save"
                                onclick={saveMember}>
                            </lightning-button>

                        </footer>

                    </div>

                </section>

                <div class="slds-backdrop slds-backdrop_open"></div>

            </template> 

            <!-- VIEW MEMBER MODAL -->
            <template if:true={showViewModal}>

                <section class="slds-modal slds-fade-in-open">

                    <div class="slds-modal__container">

                        <header class="slds-modal__header">

                            <h2 class="slds-text-heading_medium">
                                Member Details
                            </h2>

                        </header>

                        <div class="slds-modal__content slds-p-around_medium">

                            <p>
                                <strong>Name : </strong>
                                <b>{viewMemberData.Name}</b> 
                            </p>

                            <br><br>

                            <p>
                                <strong>Address : </strong>
                                <b>{viewMemberData.Address__c}</b> 
                            </p>

                            <br><br>

                            <p>
                                <strong>Age : </strong>
                                <b>{viewMemberData.Age__c}</b> 
                            </p>

                            <br><br>

                            <p>
                                <strong>Phone : </strong>
                                <b>{viewMemberData.Phone__c}</b> 
                            </p>

                            <br><br>

                            <p>
                                <strong>Total Contribution : </strong>
                                <b>{viewMemberData.total_contribution__c}</b>
                            </p>

                        </div>

                        <footer class="slds-modal__footer">

                            <lightning-button
                                label="Close"
                                onclick={closeViewModal}>
                            </lightning-button>

                        </footer>

                    </div>

                </section>

                <div class="slds-backdrop slds-backdrop_open"></div>

            </template>

            <!-- TRANSACTION MODAL -->
            <template if:true={showTransactionModal}>

                <section class="slds-modal slds-fade-in-open">

                    <div class="slds-modal__container">

                        <header class="slds-modal__header">

                            <h2 class="slds-text-heading_medium">
                                Add Transaction
                            </h2>

                        </header>

                        <div class="slds-modal__content slds-p-around_medium">

                            <lightning-input
                                label="Member Name"
                                value={selectedMemberName}
                                disabled>
                            </lightning-input>

                            <lightning-input
                                type="date"
                                label="Payment Date"
                                onchange={handlePaymentDate}>
                            </lightning-input>

                            <lightning-combobox
                                label="Type"
                                options={typeOptions}
                                onchange={handleType}>
                            </lightning-combobox>

                            <lightning-input
                                type="number"
                                label="Amount"
                                value={amount}
                                onchange={handleAmount}>
                            </lightning-input>

                        </div>

                        <footer class="slds-modal__footer">

                            <lightning-button
                                label="Cancel"
                                onclick={closeTransactionModal}>
                            </lightning-button>

                            <lightning-button
                                variant="brand"
                                label="Pay"
                                onclick={payTransaction}>
                            </lightning-button>

                        </footer>

                    </div>

                </section>

                <div class="slds-backdrop slds-backdrop_open"></div>

            </template>

        </lightning-card>

    </template>


    <!-- TRANSACTION DASHBOARD -->
    <template if:true={showTransactionComponent}>

        <c-transactions
            selected-family-id={selectedFamilyId}
            onback={handleTransactionBack}
            onrefreshtransactions={handleRefreshTransactions}>
        </c-transactions>

    </template>

</template>
